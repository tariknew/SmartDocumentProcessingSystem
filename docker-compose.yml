services:
  frontend:
    restart: unless-stopped
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "4444:4200"
    depends_on:
      - backend

  backend:
    restart: unless-stopped
    build:
      context: ./Backend
      dockerfile: API/Dockerfile
    ports:
      - "5055:5055"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings:Connection=Server=db,1433;Database=dps-db;User=sa;Password=!test123;ConnectRetryCount=0;TrustServerCertificate=True
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  db:
    image: mcr.microsoft.com/mssql/server:2017-latest-ubuntu
    restart: unless-stopped
    environment:
      - SA_PASSWORD=!test123
      - ACCEPT_EULA=Y
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    expose:
      - 1433
    networks:
      - backend
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "!test123" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

networks:
  backend:

volumes:
  sql_data: